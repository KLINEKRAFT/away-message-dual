<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Away - Dual Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#f0ede6;--accent:#d24317;--font:'Outfit',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000}
body{font-family:var(--font);-webkit-font-smoothing:antialiased;color:var(--ink)}

#gl{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block}

#clock{position:fixed;top:26px;left:30px;z-index:4;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--ink);opacity:.55;pointer-events:none}

#badge{position:fixed;top:26px;left:50%;transform:translateX(-50%);z-index:4;display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink);opacity:.42;pointer-events:none}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 2.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

#msgOuter{position:fixed;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;perspective:1400px;overflow:hidden;pointer-events:none}
#msg3d{transform-style:preserve-3d;pointer-events:none}
#msg{font-size:clamp(44px,6.5vw,94px);font-weight:500;line-height:1.08;letter-spacing:-.025em;color:var(--ink);text-shadow:0 2px 60px rgba(0,0,0,.38),0 0 100px rgba(0,0,0,.2);outline:none;max-width:68vw;text-align:center;padding:6px 10px;border-radius:2px;pointer-events:auto;cursor:text;transition:background .2s}
#msg:hover{background:rgba(255,255,255,.04)}
#msg:focus{background:rgba(255,255,255,.07);animation-play-state:paused!important}
body.locked #msg{pointer-events:none;cursor:default}
body.locked #msg:hover{background:transparent}

@keyframes goLeft{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}
@keyframes goRight{from{transform:translateX(-100%)}to{transform:translateX(100vw)}}

body.scroll-left #msg3d{width:100vw}
body.scroll-right #msg3d{width:100vw}
body.scroll-left #msg,body.scroll-right #msg{white-space:nowrap;max-width:none;text-align:left;display:inline-block;padding-right:100vw}
body.scroll-left #msg{animation:goLeft var(--sdur,18s) linear infinite}
body.scroll-right #msg{animation:goRight var(--sdur,18s) linear infinite}

@keyframes shimmer{from{background-position:200% center}to{background-position:-200% center}}
body.a-shimmer #msg{background:linear-gradient(90deg,var(--ink) 0%,var(--ink) 36%,rgba(255,255,255,.95) 50%,var(--ink) 64%,var(--ink) 100%) center/200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3.6s linear infinite}
body.a-shimmer.scroll-left #msg{animation:shimmer 3.6s linear infinite,goLeft var(--sdur,18s) linear infinite}
body.a-shimmer.scroll-right #msg{animation:shimmer 3.6s linear infinite,goRight var(--sdur,18s) linear infinite}

#kk{position:fixed;bottom:18px;right:24px;z-index:4;width:96px;opacity:.18;pointer-events:none;filter:brightness(0) invert(1)}
#kk svg{width:100%;height:auto;display:block}

#tog{position:fixed;top:19px;right:19px;z-index:6;width:38px;height:38px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:background .25s}
#tog:hover{background:rgba(255,255,255,.12)}
.bar{position:relative;width:16px;height:10px}
.bar span{position:absolute;left:0;width:100%;height:1px;background:var(--ink);transition:.4s cubic-bezier(.2,.8,.2,1)}
.bar span:nth-child(1){top:0}
.bar span:nth-child(2){top:50%;transform:translateY(-50%)}
.bar span:nth-child(3){bottom:0}
body.popen #tog .bar span:nth-child(1){top:50%;transform:translateY(-50%) rotate(45deg)}
body.popen #tog .bar span:nth-child(2){opacity:0}
body.popen #tog .bar span:nth-child(3){bottom:50%;transform:translateY(50%) rotate(-45deg)}

#panel{position:fixed;top:0;right:0;height:100%;width:258px;z-index:5;background:rgba(10,9,8,.94);border-left:1px solid rgba(255,255,255,.09);backdrop-filter:blur(18px);transform:translateX(100%);transition:transform .5s cubic-bezier(.18,.8,.2,1);display:flex;flex-direction:column;padding:66px 18px 20px;gap:22px;overflow-y:auto}
#panel.open{transform:translateX(0)}
.grp{display:flex;flex-direction:column;gap:8px}
.glbl{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.26em;text-transform:uppercase;color:rgba(240,237,230,.32)}
.strip{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07)}
.strip button,.seg button{background:transparent;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em;color:rgba(240,237,230,.5);transition:.2s;pointer-events:auto}
.strip button{text-align:left;padding:8px 11px;display:flex;justify-content:space-between;align-items:center}
.strip button:hover{background:rgba(255,255,255,.06);color:rgba(240,237,230,.85)}
.strip button.on{background:rgba(255,255,255,.1);color:#fff}
.strip button .t{opacity:.38;font-size:9px}
.strip button.on .t{opacity:.65}
.seg{display:grid;gap:1px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07)}
.seg button{padding:8px 4px;text-align:center}
.seg button:hover{background:rgba(255,255,255,.06);color:rgba(240,237,230,.9)}
.seg button.on{background:rgba(255,255,255,.11);color:#fff}
.seg3{grid-template-columns:1fr 1fr 1fr}
.seg5{grid-template-columns:1fr 1fr 1fr 1fr 1fr}
.sz-row{display:flex;align-items:center;gap:9px}
.sz-lbl{font-family:'DM Mono',monospace;font-size:9px;color:rgba(240,237,230,.55);min-width:34px;text-align:right}
input[type=range]{flex:1;-webkit-appearance:none;height:1px;background:rgba(255,255,255,.22);cursor:pointer;outline:none;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:rgba(240,237,230,.78);border-radius:50%;cursor:pointer;transition:.15s}
input[type=range]::-webkit-slider-thumb:hover{background:#fff}
.sz-rst{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(240,237,230,.42);cursor:pointer;width:20px;height:20px;font-size:11px;line-height:1;flex-shrink:0;transition:.2s;display:flex;align-items:center;justify-content:center}
.sz-rst:hover{background:rgba(255,255,255,.08);color:rgba(240,237,230,.9)}
.pr{display:flex;align-items:center;gap:8px;padding:1px 0}
.pr label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:rgba(240,237,230,.4);flex:1}
input[type=color]{-webkit-appearance:none;width:28px;height:19px;border:1px solid rgba(255,255,255,.14);background:none;cursor:pointer;padding:1px}
input[type=color]::-webkit-color-swatch-wrapper{padding:1px}
input[type=color]::-webkit-color-swatch{border:none}
.abtn{background:transparent;border:1px solid rgba(255,255,255,.1);padding:10px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,237,230,.5);transition:.25s;text-align:center;width:100%}
.abtn:hover{background:rgba(255,255,255,.07);color:rgba(240,237,230,.9)}
.cred{margin-top:auto;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,237,230,.18);line-height:1.9}
.status-bar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:4;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;color:rgba(240,237,230,.35);text-transform:uppercase;pointer-events:none}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="clock"></div>
<div id="badge"><span class="dot"></span><span>Away</span></div>

<div id="msgOuter">
  <div id="msg3d">
    <div id="msg" contenteditable="true" spellcheck="false">Be right back</div>
  </div>
</div>

/* ─────── Broadcast Channel Setup ─────── */
let bc = null;
try{
  bc = new BroadcastChannel('away_dual_sync');
  bc.onmessage = (e)=>{
    const {type,data} = e.data;
    if(type==='message') document.getElementById('msg').textContent = data.text;
    if(type==='animation') applyAnimFromSync(data);
    if(type==='scroll') applyScrollFromSync(data);
    if(type==='style') applyStyleFromSync(data);
    if(type==='size') applySizeFromSync(data);
  };
}catch(err){
  console.warn('BroadcastChannel not available:', err);
}

function broadcast(type, data){
  if(bc) bc.postMessage({type, data});
}

function showStatus(msg){
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  setTimeout(()=>{ bar.textContent = 'Ready'; }, 2000);
}

/* ─────── WebGL Boilerplate ─────── */
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl',{antialias:false});
gl.getExtension('OES_standard_derivatives');

const VERT = `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;

const COMMON = `precision highp float;
uniform vec2 u_r;uniform float u_t;uniform vec2 u_m;uniform vec3 u_c;uniform vec3 u_ck;
float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float n(vec2 p){
  vec2 i=floor(p),f=fract(p);
  float a=h(i),b=h(i+vec2(1,0)),c=h(i+vec2(0,1)),d=h(i+vec2(1,1));
  vec2 u=f*f*(3.-2.*f);
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*n(p);p*=2.02;a*=.5;}return v;}
`;

const SHADERS=[
{name:'Gradient Drift',src:`void main(){vec2 uv=gl_FragCoord.xy/u_r;float ar=u_r.x/u_r.y;vec2 q=uv;q.x*=ar;float t=u_t*.06;float w=fbm(q*1.6+t+(u_m-.5)*1.2);float g=uv.y*.6+uv.x*.2+w*.5;float cd=distance(uv,u_ck.xy);g+=sin(cd*32.-u_ck.z*7.)*exp(-cd*5.)*exp(-u_ck.z*2.5)*.22;float s=smoothstep(.05,1.05,g);vec3 col=mix(u_c*.48,u_c*1.18,s);gl_FragColor=vec4(clamp(col,0.,1.),1.);}`},
{name:'Grid Field',src:`void main(){vec2 uv=gl_FragCoord.xy/u_r;float ar=u_r.x/u_r.y;vec2 p=uv;p.x*=ar;vec2 m=u_m;m.x*=ar;vec2 d=p-m;float dl=length(d);p-=normalize(d+1e-4)*exp(-dl*4.5)*.06;float cd=distance(uv,u_ck.xy);float rg=exp(-abs(cd-u_ck.z*.35)*22.)*exp(-u_ck.z*2.2);vec2 gv=abs(fract(p*26.)-.5);float dot=smoothstep(.46,.5,max(gv.x,gv.y));float ink=mix(.9,.32,(1.-dot)*.5)-rg*.38;gl_FragColor=vec4(clamp(u_c*ink,0.,1.),1.);}`},
{name:'Soft Noise',src:`void main(){vec2 uv=gl_FragCoord.xy/u_r;float ar=u_r.x/u_r.y;vec2 q=uv;q.x*=ar;float t=u_t*.04;float v=fbm(q*3.+vec2(t,t*.7))+fbm(q*7.-t)*.3;float ld=distance(uv,u_m);v=mix(v,v*1.6-.2,exp(-ld*ld*9.)*.7);float cd=distance(uv,u_ck.xy);v+=exp(-cd*cd*38.)*exp(-u_ck.z*1.8)*.38;vec3 col=mix(u_c*.72,u_c*1.14,smoothstep(.2,.85,v));gl_FragColor=vec4(clamp(col,0.,1.),1.);}`},
{name:'Contour Lines',ext:true,src:`void main(){vec2 uv=gl_FragCoord.xy/u_r;float ar=u_r.x/u_r.y;vec2 q=uv;q.x*=ar;vec2 m=u_m;m.x*=ar;float t=u_t*.05;float f=fbm(q*2.2+vec2(t*.6,t));f+=exp(-dot(q-m,q-m)*5.)*.24;float cd=distance(uv,u_ck.xy);f+=exp(-cd*cd*18.)*exp(-u_ck.z*2.)*.28;float l=f*16.;float e=fract(l);float w=fwidth(l)*1.5;float c=smoothstep(0.,w,e)*smoothstep(1.,1.-w,e);gl_FragColor=vec4(clamp(u_c*mix(.94,.36,1.-c),0.,1.),1.);}`},
{name:'Mono Liquid',src:`void main(){vec2 uv=gl_FragCoord.xy/u_r;float ar=u_r.x/u_r.y;vec2 q=uv;q.x*=ar;vec2 m=u_m;m.x*=ar;float t=u_t*.12;float md=distance(q,m);vec2 dp=q+(q-m)*exp(-md*3.5)*.18;float cd=distance(uv,u_ck.xy);float sh=sin(cd*40.-u_ck.z*9.)*exp(-cd*4.5)*exp(-u_ck.z*2.5);float s=fbm(dp*2.4+vec2(t,t*.5))+fbm(dp*5.-t*.7)*.4+sh*.3;float mt=pow(abs(sin(s*5.+t)),1.5);gl_FragColor=vec4(clamp(mix(u_c*.4,u_c*1.3,mt),0.,1.),1.);}`},
{name:'Liquid Chrome',src:`void main(){vec2 uv=gl_FragCoord.xy/u_r;float ar=u_r.x/u_r.y;vec2 p=vec2(uv.x*ar,uv.y);vec2 m=vec2(u_m.x*ar,u_m.y);float t=u_t*.09;float n1=fbm(p*1.8+vec2(t*.6,t*.4));float n2=fbm(p*3.2-vec2(t*.3,t*.5));float n3=fbm(p*5.5+vec2(t*.7,-t*.3));vec2 dp=vec2(n1-.5,n2-.5)*.38;float md=length(p-m);dp+=(p-m)/max(md,.01)*exp(-md*3.5)*.16;float cd=length(uv-u_ck.xy);float sw=sin(cd*44.-u_ck.z*10.)*exp(-cd*5.)*exp(-u_ck.z*2.5);dp+=vec2(sw)*.07;float env=fbm((uv+dp)*2.5+vec2(t*.2));float v=n1*.42+n2*.33+n3*.25;v=smoothstep(.18,.82,v+env*.28);vec3 dark=vec3(.04,.045,.06);vec3 mid=vec3(.5,.54,.6);vec3 bright=vec3(.9,.93,.96);vec3 col=mix(dark,mid,smoothstep(0.,.5,v));col=mix(col,bright,smoothstep(.5,1.,v));float iv=n3*2.+t*.14;float ir=pow(max(0.,1.-abs(fract(iv)-.5)*4.),2.);vec3 iri=vec3(.5+.5*sin(iv*6.28),.5+.5*sin(iv*6.28+2.09),.5+.5*sin(iv*6.28+4.19));col=mix(col,iri,ir*.2);float ca=fbm(uv*8.+t)*.015;col.r=mix(col.r,fbm((uv+dp+ca)*2.5+vec2(t*.2)),v*.3);gl_FragColor=vec4(clamp(col,0.,1.),1.);}`},
{name:'Mesh Gradient',src:`void main(){vec2 uv=gl_FragCoord.xy/u_r;float t=u_t*.1;vec2 p0=vec2(.15+sin(t*.7)*.12,.22+cos(t*.5)*.15);vec2 p1=vec2(.85+sin(t*.4)*.08,.25+cos(t*.9)*.18);vec2 p2=vec2(.5+sin(t*.55)*.2,.82+cos(t*.3)*.08);vec2 p3=vec2(.1+sin(t*.35)*.08,.72+cos(t*.6)*.12);vec2 p4=vec2(.75+sin(t*.8)*.12,.62+cos(t*.45)*.1);vec3 c0=vec3(.82,.79,.74);vec3 c1=vec3(.62,.72,.82);vec3 c2=vec3(.76,.72,.82);vec3 c3=vec3(.82,.74,.66);vec3 c4=vec3(.66,.78,.72);vec3 cm=u_c;float w0=1./max(dot(uv-p0,uv-p0),.0001);float w1=1./max(dot(uv-p1,uv-p1),.0001);float w2=1./max(dot(uv-p2,uv-p2),.0001);float w3=1./max(dot(uv-p3,uv-p3),.0001);float w4=1./max(dot(uv-p4,uv-p4),.0001);float wm=1./max(dot(uv-u_m,uv-u_m),.0001)*.32;float tot=w0+w1+w2+w3+w4+wm;vec3 col=(c0*w0+c1*w1+c2*w2+c3*w3+c4*w4+cm*wm)/tot;float cd=length(uv-u_ck.xy);col+=sin(cd*26.-u_ck.z*6.)*exp(-cd*4.)*exp(-u_ck.z*2.)*.055;gl_FragColor=vec4(clamp(col,0.,1.),1.);}`},

function mk(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s),src);return s;}
function mkProg(fsrc){const p=gl.createProgram();gl.attachShader(p,mk(gl.VERTEX_SHADER,VERT));gl.attachShader(p,mk(gl.FRAGMENT_SHADER,fsrc));gl.linkProgram(p);return p;}

gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);

const progs=SHADERS.map(s=>{let frag=COMMON;if(s.ext)frag='#extension GL_OES_standard_derivatives : enable\n'+frag;frag+=s.src;const p=mkProg(frag);return{p,loc:{pos:gl.getAttribLocation(p,'p'),r:gl.getUniformLocation(p,'u_r'),t:gl.getUniformLocation(p,'u_t'),m:gl.getUniformLocation(p,'u_m'),c:gl.getUniformLocation(p,'u_c'),ck:gl.getUniformLocation(p,'u_ck'),}};});

let cur=6;
let DPR=Math.min(devicePixelRatio||1,1.75);
function resize(){DPR=Math.min(devicePixelRatio||1,1.75);canvas.width=innerWidth*DPR;canvas.height=innerHeight*DPR;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';}
addEventListener('resize',resize);resize();

const mouse={x:.5,y:.5,tx:.5,ty:.5};
let ckX=.5,ckY=.5,ckT=-99;
addEventListener('pointermove',e=>{mouse.tx=e.clientX/innerWidth;mouse.ty=1-e.clientY/innerHeight;});
addEventListener('pointerdown',e=>{if(e.target.closest('#panel,#tog,[contenteditable]'))return;ckX=e.clientX/innerWidth;ckY=1-e.clientY/innerHeight;ckT=performance.now()/1000;});

let sCol=[.81,.79,.75];
const T0=performance.now();

const msg3d=document.getElementById('msg3d');
const msg=document.getElementById('msg');
let rx=0,ry=0,trx=0,try_=0;
let curAnim='',curScroll='',origText=msg.textContent;
let glitchTimer=null,glitchInner=null,typeTimer=null;

addEventListener('pointermove',e=>{const cx=e.clientX/innerWidth-.5,cy=e.clientY/innerHeight-.5;trx=-cy*9;try_=cx*9;});
addEventListener('mouseleave',()=>{trx=0;try_=0;});

function loop(){
  const now=performance.now();
  const t=(now-T0)/1000;
  const age=now/1000-ckT;

  mouse.x+=(mouse.tx-mouse.x)*.065;
  mouse.y+=(mouse.ty-mouse.y)*.065;

  const g=progs[cur];
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.useProgram(g.p);
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.enableVertexAttribArray(g.loc.pos);
  gl.vertexAttribPointer(g.loc.pos,2,gl.FLOAT,false,0,0);
  gl.uniform2f(g.loc.r,canvas.width,canvas.height);
  gl.uniform1f(g.loc.t,t);
  gl.uniform2f(g.loc.m,mouse.x,mouse.y);
  gl.uniform3f(g.loc.c,sCol[0],sCol[1],sCol[2]);
  gl.uniform3f(g.loc.ck,ckX,ckY,Math.min(age,8));
  gl.drawArrays(gl.TRIANGLES,0,3);

  const scrollOn=!!curScroll;
  const tr=scrollOn?0:trx,ty=scrollOn?0:try_;
  rx+=(tr-rx)*.07;ry+=(ty-ry)*.07;

  const floatY=(curAnim==='a-float')?Math.sin(t*1.45)*14:0;
  msg3d.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) translateY(${floatY}px)`;

  if(curAnim==='a-pulse'){msg3d.style.opacity=String(.25+.75*(.5+.5*Math.sin(t*2.0)));}else{msg3d.style.opacity='';}

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function tick(){const d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
tick();setInterval(tick,1000);

function stopAnims(){clearInterval(glitchTimer);clearInterval(glitchInner);clearInterval(typeTimer);glitchTimer=glitchInner=typeTimer=null;msg.classList.remove('glitching');if(curAnim==='a-type'||curAnim==='a-glitch')msg.textContent=origText;}

function runGlitch(){const chars='!<>-_\\/[]{}=+*^?#§±~';function scramble(){clearInterval(glitchInner);let i=0;glitchInner=setInterval(()=>{msg.textContent=origText.split('').map((_,j)=>{if(j<i)return origText[j];return chars[Math.floor(Math.random()*chars.length)];}).join('');if(++i>origText.length){clearInterval(glitchInner);glitchInner=null;msg.textContent=origText;}},52);}scramble();glitchTimer=setInterval(scramble,3000+Math.random()*1600);}

function setAnim(a){
  console.log('setAnim() called with:', a);
  stopAnims();
  document.body.classList.remove(curAnim);
  curAnim=a;
  if(a)document.body.classList.add(a);
  console.log('Animation class applied:', a, 'body.className:', document.body.className);
  if(a==='a-glitch'){origText=msg.textContent;runGlitch();}
  broadcast('animation',{anim:a});
}

function setScroll(s){
  console.log('setScroll() called with:', s);
  document.body.classList.remove(curScroll);
  curScroll=s;
  if(s)document.body.classList.add(s);
  const dur=Math.max(10,msg.textContent.length*.52);
  document.documentElement.style.setProperty('--sdur',dur+'s');
  console.log('Scroll class applied:', s, 'duration:', dur+'s', 'body.className:', document.body.className);
  broadcast('scroll',{scroll:s});
}

function applyAnimFromSync(data){stopAnims();document.body.classList.remove(curAnim);curAnim=data.anim;if(data.anim)document.body.classList.add(data.anim);if(data.anim==='a-glitch'){origText=msg.textContent;runGlitch();}}

function applyScrollFromSync(data){document.body.classList.remove(curScroll);curScroll=data.scroll;if(data.scroll)document.body.classList.add(data.scroll);const dur=Math.max(10,msg.textContent.length*.52);document.documentElement.style.setProperty('--sdur',dur+'s');}

function applyStyleFromSync(data){if(data.inkColor)document.documentElement.style.setProperty('--ink',data.inkColor);if(data.accentColor)document.documentElement.style.setProperty('--accent',data.accentColor);if(data.shaderCol){const c=data.shaderCol;sCol=[c.r,c.g,c.b];}}

function applySizeFromSync(data){if(data.fontSize){msg.style.fontSize=data.fontSize+'px';document.getElementById('szVal').textContent=data.fontSize+'px';document.getElementById('szR').value=data.fontSize;}else{msg.style.fontSize='';document.getElementById('szVal').textContent='Auto';document.getElementById('szR').value=72;}}

msg.addEventListener('input',()=>{origText=msg.textContent;if(curScroll){const dur=Math.max(10,msg.textContent.length*.52);document.documentElement.style.setProperty('--sdur',dur+'s');}broadcast('message',{text:msg.textContent});});

const panel=document.getElementById('panel');
document.getElementById('tog').onclick=()=>{panel.classList.toggle('open');document.body.classList.toggle('popen');};

const bgList=document.getElementById('bgList');
SHADERS.forEach((s,i)=>{
  const b=document.createElement('button');
  b.innerHTML=`<span>${s.name}</span><span class="t">0${i+1}</span>`;
  if(i===cur)b.classList.add('on');
  b.addEventListener('click',(e)=>{
    e.preventDefault();
    e.stopPropagation();
    console.log('Shader selected:', s.name, 'index:', i);
    cur=i;
    [...bgList.children].forEach(c=>c.classList.remove('on'));
    b.classList.add('on');
  });
  bgList.appendChild(b);
});

document.getElementById('scrollSeg').querySelectorAll('button').forEach(b=>{
  b.addEventListener('click',(e)=>{
    e.preventDefault();
    e.stopPropagation();
    console.log('Scroll clicked:', b.dataset.s);
    document.getElementById('scrollSeg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    setScroll(b.dataset.s);
  });
});

document.getElementById('animSeg').querySelectorAll('button').forEach(b=>{
  b.addEventListener('click',(e)=>{
    e.preventDefault();
    e.stopPropagation();
    console.log('Animation clicked:', b.dataset.a);
    document.getElementById('animSeg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    setAnim(b.dataset.a);
  });
});

const FONTS=[['Outfit','\'Outfit\',sans-serif'],['DM Mono','\'DM Mono\',monospace'],['Cormorant','\'Cormorant Garamond\',serif'],['Syne','\'Syne\',sans-serif'],['Epilogue','\'Epilogue\',sans-serif'],];
const fontList=document.getElementById('fontList');
FONTS.forEach(([label,fam],i)=>{const b=document.createElement('button');b.innerHTML=`<span style="font-family:${fam}">${label}</span>`;if(i===0)b.classList.add('on');b.onclick=()=>{msg.style.fontFamily=fam;[...fontList.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');broadcast('style',{font:fam});};fontList.appendChild(b);});

const szR=document.getElementById('szR');
const szVal=document.getElementById('szVal');
szR.oninput=e=>{msg.style.fontSize=e.target.value+'px';szVal.textContent=e.target.value+'px';broadcast('size',{fontSize:parseInt(e.target.value)});};
document.getElementById('szRst').onclick=()=>{msg.style.fontSize='';szVal.textContent='Auto';szR.value=72;broadcast('size',{fontSize:null});};

function h2rgb(h){const n=parseInt(h.slice(1),16);return[(n>>16&255)/255,(n>>8&255)/255,(n&255)/255];}
document.getElementById('cInk').oninput=e=>{document.documentElement.style.setProperty('--ink',e.target.value);broadcast('style',{inkColor:e.target.value});};
document.getElementById('cAcc').oninput=e=>{document.documentElement.style.setProperty('--accent',e.target.value);broadcast('style',{accentColor:e.target.value});};
document.getElementById('cShd').oninput=e=>{sCol=h2rgb(e.target.value);broadcast('style',{shaderCol:{r:sCol[0],g:sCol[1],b:sCol[2]}});};
sCol=h2rgb('#cfcabf');

const lockBtn=document.getElementById('lockBtn');
lockBtn.onclick=()=>{document.body.classList.toggle('locked');lockBtn.textContent=document.body.classList.contains('locked')?'Unlock editing':'Lock editing';};

document.getElementById('openOtherBtn').onclick=()=>{const w=window.open(window.location.href,'Away_Monitor_2','width=1920,height=1080,left=1920');if(w)showStatus('Opened on other screen');else showStatus('Pop-up blocked - open manually');};
</script>
</body>
